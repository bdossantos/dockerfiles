schemaVersion: '2.0.0'

fileExistenceTests:
  - name: 'routelib.lua exists'
    path: '/usr/local/lib/memcached/routelib.lua'
    shouldExist: true
    permissions: '-rw-r--r--'
    uid: 65534
    gid: 65534

commandTests:
  - name: 'routelib.lua SHA256 checksum'
    command: 'sha256sum'
    args: ['/usr/local/lib/memcached/routelib.lua']
    expectedOutput:
      - '97aa953893995971dd39b4a15ba2ddc58445d81ea8a40f2ef70e88d2078764e9'

  - name: 'memcached version check'
    command: 'memcached'
    args: ['-V']
    exitCode: 0
    expectedOutput:
      - 'memcached 1.6.42'

  - name: 'memcached proxy support check'
    command: 'memcached'
    args: ['-h']
    exitCode: 0
    expectedOutput:
      - 'proxy_config'
