schemaVersion: '2.0.0'

fileExistenceTests:
  - name: 'manage.py exists'
    path: '/app/manage.py'
    shouldExist: true
    uid: 0
    gid: 0
  - name: 'nltk stopwords corpus exists'
    path: '/usr/share/nltk_data/corpora/stopwords'
    shouldExist: true
  - name: 'nltk punkt_tab tokenizer exists'
    path: '/usr/share/nltk_data/tokenizers/punkt_tab'
    shouldExist: true
