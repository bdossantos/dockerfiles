schemaVersion: '2.0.0'

commandTests:
  - name: 'memcached version check'
    command: 'memcached'
    args: ['-V']
    exitCode: 0
    expectedOutput:
      - 'memcached 1.6.42'

  - name: 'memcached proxy support check'
    command: 'memcached'
    args: ['-h']
    exitCode: 0
    expectedOutput:
      - 'proxy_config'
