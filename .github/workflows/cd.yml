---
name: CD

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      dockerfiles: ${{ steps.discover.outputs.dockerfiles }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6
      - name: Discover Dockerfiles
        id: discover
        run: |
          dockerfiles=$(find dockerfiles -type f -name 'Dockerfile*' | sort | jq -R -s -c 'split("\n")[:-1]')
          echo "dockerfiles=${dockerfiles}" >> $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: discover
    strategy:
      matrix:
        dockerfile: ${{ fromJSON(needs.discover.outputs.dockerfiles) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6
      - name: Build and push
        uses: ./.github/actions/docker
        with:
          dockerfile: ${{ matrix.dockerfile }}
          registry_password: ${{ secrets.DOCKERHUB_TOKEN }}
